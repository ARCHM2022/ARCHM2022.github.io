<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Моя таблиця</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <div id="password-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Введіть пароль</h2>
        <input type="password" id="password-input" />
        <button id="password-button">ОК</button>
      </div>
    </div>
    <button id="edit-button">Редагування таблиці</button>
    <table id="my-table">
      <tr>
        <th>№</th>
        <th>Прізвище</th>
        <th>Ім'я</th>
        <th>По-батькові</th>
      </tr>
      <tr>
        <td>1</td>
        <td>Петренко</td>
        <td>Іван</td>
        <td>Олександрович</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Сидоренко</td>
        <td>Марина</td>
        <td>Петрівна</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Ковальчук</td>
        <td>Олег</td>
        <td>Анатолійович</td>
      </tr>
      <tr>
        <td>4</td>
        <td>Павлюк</td>
        <td>Андрій</td>
        <td>Вікторович</td>
      </tr>
    </table>
    <script src="index.js"></script>
  </body>
</html>
